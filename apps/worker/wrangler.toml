name = "realtime-wait"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# 관리자 데모 키. 로컬 개발에서는 .dev.vars 로 덮어쓴다.
# 운영 secret 은 `wrangler secret put ADMIN_KEY` 로 주입한다 (toml 에 하드코딩 금지).
[vars]
ADMIN_KEY = "demo-admin-key"
ALLOWED_ORIGIN = "*"

[[d1_databases]]
binding = "DB"
database_name = "realtime-wait"
database_id = "ad0b8f4e-4248-4fde-bb95-9012cd9f9ea1"

# web 빌드 산출물(apps/web/dist)을 같은 오리진에서 서빙한다.
# /api 외 경로는 Worker.notFound 가 env.ASSETS 로 위임하고,
# SPA 클라이언트 라우트는 not_found_handling 으로 index.html 을 돌려준다.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
