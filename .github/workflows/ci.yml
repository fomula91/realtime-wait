name: CI

# push/PR 에 verify(검증), main push 에 verify 통과 시 자동 배포 (ADR-0010 옵션 B)
on:
  push:
    branches: [main]
  pull_request:

# 같은 ref 의 이전 실행은 취소한다(중복 배포·낭비 방지)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (check:env → install → typecheck → test)
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      # verify 가 내부에서 frozen install 까지 수행한다(check:env 가 먼저 도는 순서 유지)
      - run: corepack pnpm verify

  deploy:
    name: deploy (wrangler)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      # 루트 deploy 스크립트 재사용: web build → wrangler deploy (단일 출처, 드리프트 방지)
      - name: Deploy to Cloudflare
        run: corepack pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
